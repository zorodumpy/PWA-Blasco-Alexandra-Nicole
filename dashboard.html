<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Management Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background-color: #eae9ec;
    }

    /* --- Sidebar --- */
    .sidebar {
      width: 250px;
      background: linear-gradient(180deg, #0a059e 0%, #3989de 100%);
      color: #523eff;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px 0;
      border-top-right-radius: 20px;
      border-bottom-right-radius: 20px;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2);
    }

    .logo-section {
      padding: 0 20px 30px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 20px;
    }
    .logo-section h3 { font-weight: 700; font-size: 18px; color: #fdfdff; margin-top: 5px; }
    .logo-section i { font-size: 30px; color: #ffffff; }

    .sidebar .menu {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 15px;
      margin: 5px 15px;
      background-color: #ffffff;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      color: #0d0399;
    }
    .menu-icon {
      background-color: #0d0399;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #fff;
    }

    .logout {
      padding: 12px 20px;
      text-align: left;
      font-weight: 600;
      cursor: pointer;
      color: #050505;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 15px 15px 15px;
      background-color: #ffffff;
      border-radius: 10px;
      padding: 12px 15px;
    }
    .logout:hover { color: #fff; background-color: rgba(255, 255, 255, 0.2); }

    /* --- Main Content --- */
    .main {
      flex: 1;
      padding: 40px;
      overflow-y: auto;
    }
    h2 {
      color: #443fde;
      margin-bottom: 20px;
      font-size: 24px;
      font-weight: 700;
    }

    .card {
      background-color: #fff;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
      padding: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .search-box {
      background: #cfcfcf;
      border-radius: 30px;
      padding: 10px 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      width: 350px;
    }
    .search-box input {
      border: none;
      outline: none;
      background: transparent;
      width: 100%;
      font-size: 14px;
    }

    .add-btn {
      background-color: #4248f1;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      cursor: pointer;
      font-weight: 600;
      transition: background-color 0.2s;
      white-space: nowrap;
    }
    .add-btn:hover { background-color: #5719ff; }

    /* --- Table --- */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid #eee;
    }
    th {
      background-color: #fcfcfc;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      font-size: 12px;
    }
    tr:nth-child(even) { background-color: #fafafa; }

    .action a {
      margin-right: 15px;
      text-decoration: none;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
    }
    .action a.edit { color: #007bff; }
    .action a.delete { color: #dc3545; }
    .action a:hover { text-decoration: underline; }

    /* --- Modal --- */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }
    .modal-content h3 {
      margin-bottom: 20px;
      text-align: center;
      color: #2c2147;
      font-size: 20px;
    }
    .modal-content input, .modal-content select {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
    }
    .modal-content input:focus, .modal-content select:focus {
      outline: none;
      border-color: #4248f1;
      box-shadow: 0 0 5px rgba(66, 72, 241, 0.3);
    }
    .modal-content button {
      background-color: #193be1;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      cursor: pointer;
      margin-right: 10px;
      font-weight: 600;
      transition: background-color 0.2s;
    }
    .modal-content button:hover {
      background-color: #152fa8;
    }
    .modal-content button.cancel {
      background-color: #ccc;
      color: #333;
    }
    .modal-content button.cancel:hover {
      background-color: #bbb;
    }

    .modal-buttons {
      text-align: right;
      margin-top: 20px;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .empty-state i {
      font-size: 48px;
      color: #ddd;
      margin-bottom: 15px;
    }

    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px 20px;
      border-radius: 6px;
      z-index: 2000;
      display: none;
      animation: slideIn 0.3s ease-out;
    }

    .notification.show {
      display: block;
    }

    .notification.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .notification.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        border-radius: 0;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
      }
      .main {
        padding: 20px;
      }
      .search-box {
        width: 100%;
      }
      .top-bar {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="sidebar">
    <div>
      <div class="logo-section">
        <i class="fas fa-users"></i>
        <h3>USER MANAGEMENT</h3>
      </div>
      <div class="menu">
        <div class="menu-icon"><i class="fas fa-user-cog"></i></div>
        <span>Users</span>
      </div>
    </div>
    <div class="logout" id="logoutBtn">
      <i class="fas fa-sign-out-alt"></i> Logout
    </div>
  </div>

  <div class="main">
    <h2>Manage Users</h2>
    <div class="card">
      <div class="top-bar">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="search" placeholder="Search user...">
        </div>
        <button class="add-btn" id="addUserBtn"><i class="fas fa-plus"></i> Add User</button>
      </div>

      <table id="userTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Full Name</th>
            <th>Email</th>
            <th>Username</th>
            <th>Role</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>

      <div class="empty-state" id="emptyState" style="display: none;">
        <i class="fas fa-inbox"></i>
        <p>No users found</p>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal" id="userModal">
    <div class="modal-content">
      <h3 id="modalTitle">Add User</h3>
      <form id="userForm">
        <input type="hidden" id="userId">
        <input type="text" id="fullName" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <select id="userRole" required>
          <option value="Admin">Admin</option>
          <option value="Staff">Staff</option>
          <option value="Regular User">Regular User</option>
        </select>
        <div class="modal-buttons">
          <button type="button" class="cancel" id="cancelBtn">Cancel</button>
          <button type="submit" id="saveBtn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Notification -->
  <div class="notification" id="notification"></div>

  <script>
    // ============ INITIALIZATION ============
    function initializeDashboard() {
      // Check if user is logged in
      if (!localStorage.getItem('isLoggedIn')) {
        window.location.href = 'index.html';
        return;
      }

      loadUsers();
    }

    // ============ USER DATA MANAGEMENT ============
    function getUsers() {
      return JSON.parse(localStorage.getItem('users') || '[]');
    }

    function saveUsers(users) {
      localStorage.setItem('users', JSON.stringify(users));
    }

    function getNextUserId() {
      const users = getUsers();
      const maxId = users.length > 0 ? Math.max(...users.map(u => u.id)) : 0;
      return maxId + 1;
    }

    // ============ NOTIFICATION SYSTEM ============
    function showNotification(message, type = 'success') {
      const notification = document.getElementById('notification');
      notification.textContent = message;
      notification.className = `notification ${type} show`;
      
      setTimeout(() => {
        notification.classList.remove('show');
      }, 3000);
    }

    // ============ TABLE MANAGEMENT ============
    function loadUsers() {
      const users = getUsers();
      const tbody = document.getElementById('tableBody');
      const emptyState = document.getElementById('emptyState');

      if (users.length === 0) {
        tbody.innerHTML = '';
        emptyState.style.display = 'block';
      } else {
        emptyState.style.display = 'none';
        tbody.innerHTML = users.map(u => `
          <tr>
            <td>${u.id}</td>
            <td>${u.fullname}</td>
            <td>${u.email}</td>
            <td>${u.username}</td>
            <td>${u.user_role}</td>
            <td class="action">
              <a class="edit" data-id="${u.id}">Edit</a>
              <a class="delete" data-id="${u.id}">Delete</a>
            </td>
          </tr>
        `).join('');

        // Add event listeners to action buttons
        document.querySelectorAll('.action .edit').forEach(link => {
          link.addEventListener('click', (e) => {
            e.preventDefault();
            editUser(link.dataset.id);
          });
        });

        document.querySelectorAll('.action .delete').forEach(link => {
          link.addEventListener('click', (e) => {
            e.preventDefault();
            deleteUser(link.dataset.id);
          });
        });
      }
    }

    function filterUsers() {
      const searchValue = document.getElementById('search').value.toUpperCase();
      const users = getUsers();
      const tbody = document.getElementById('tableBody');
      const emptyState = document.getElementById('emptyState');

      const filtered = users.filter(u => 
        u.fullname.toUpperCase().includes(searchValue) ||
        u.email.toUpperCase().includes(searchValue) ||
        u.username.toUpperCase().includes(searchValue) ||
        u.user_role.toUpperCase().includes(searchValue) ||
        u.id.toString().includes(searchValue)
      );

      if (filtered.length === 0) {
        tbody.innerHTML = '';
        emptyState.style.display = 'block';
      } else {
        emptyState.style.display = 'none';
        tbody.innerHTML = filtered.map(u => `
          <tr>
            <td>${u.id}</td>
            <td>${u.fullname}</td>
            <td>${u.email}</td>
            <td>${u.username}</td>
            <td>${u.user_role}</td>
            <td class="action">
              <a class="edit" data-id="${u.id}">Edit</a>
              <a class="delete" data-id="${u.id}">Delete</a>
            </td>
          </tr>
        `).join('');

        // Re-attach event listeners to filtered results
        document.querySelectorAll('.action .edit').forEach(link => {
          link.addEventListener('click', (e) => {
            e.preventDefault();
            editUser(link.dataset.id);
          });
        });

        document.querySelectorAll('.action .delete').forEach(link => {
          link.addEventListener('click', (e) => {
            e.preventDefault();
            deleteUser(link.dataset.id);
          });
        });
      }
    }

    // ============ MODAL MANAGEMENT ============
    function openModal() {
      document.getElementById('userModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('userModal').classList.remove('active');
      document.getElementById('userForm').reset();
      document.getElementById('userId').value = '';
    }

    function editUser(id) {
      const users = getUsers();
      const user = users.find(u => u.id == id);

      if (user) {
        document.getElementById('modalTitle').textContent = 'Edit User';
        document.getElementById('userId').value = user.id;
        document.getElementById('fullName').value = user.fullname;
        document.getElementById('email').value = user.email;
        document.getElementById('username').value = user.username;
        document.getElementById('password').value = '';
        document.getElementById('password').placeholder = 'Leave blank to keep current password';
        document.getElementById('userRole').value = user.user_role;
        openModal();
      }
    }

    function deleteUser(id) {
      if (confirm('Are you sure you want to delete this user?')) {
        let users = getUsers();
        users = users.filter(u => u.id != id);
        saveUsers(users);
        loadUsers();
        showNotification('User deleted successfully!', 'success');
      }
    }

    // ============ FORM HANDLING ============
    document.getElementById('userForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const userId = document.getElementById('userId').value;
      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const userRole = document.getElementById('userRole').value;

      // Validation
      if (!fullName || !email || !username || !userRole) {
        showNotification('Please fill in all fields!', 'error');
        return;
      }

      if (!email.includes('@')) {
        showNotification('Please enter a valid email!', 'error');
        return;
      }

      let users = getUsers();

      if (userId) {
        // Edit mode
        if (!password) {
          showNotification('Please enter a password to update!', 'error');
          return;
        }

        const userIndex = users.findIndex(u => u.id == userId);
        if (userIndex !== -1) {
          users[userIndex] = {
            ...users[userIndex],
            fullname: fullName,
            email: email,
            username: username,
            password: password,
            user_role: userRole
          };
          saveUsers(users);
          showNotification('User updated successfully!', 'success');
        }
      } else {
        // Add mode
        if (!password) {
          showNotification('Password is required for new users!', 'error');
          return;
        }

        // Check if username already exists
        if (users.some(u => u.username === username)) {
          showNotification('Username already exists!', 'error');
          return;
        }

        const newUser = {
          id: getNextUserId(),
          fullname: fullName,
          email: email,
          username: username,
          password: password,
          user_role: userRole
        };

        users.push(newUser);
        saveUsers(users);
        showNotification('User added successfully!', 'success');
      }

      closeModal();
      loadUsers();
    });

    // ============ EVENT LISTENERS ============
    document.getElementById('addUserBtn').addEventListener('click', () => {
      document.getElementById('modalTitle').textContent = 'Add User';
      document.getElementById('userId').value = '';
      document.getElementById('password').placeholder = 'Password';
      openModal();
    });

    document.getElementById('cancelBtn').addEventListener('click', closeModal);

    document.getElementById('search').addEventListener('keyup', filterUsers);

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('isLoggedIn');
      localStorage.removeItem('currentUser');
      window.location.href = 'index.html';
    });

    // Close modal when clicking outside
    window.addEventListener('click', (e) => {
      const modal = document.getElementById('userModal');
      if (e.target === modal) {
        closeModal();
      }
    });

    // Initialize on page load
    initializeDashboard();
  </script>
</body>
</html>
